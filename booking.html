<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summon Him | Mysterious Kayden</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .booking-page-container {
            padding: 150px 5% 100px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .summon-form {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--mystic-violet);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--starlight);
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: var(--smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--inferno-orange);
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
        
        .submit-btn-group {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        
        .submit-btn-group button {
            flex: 1;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .submit-btn-group { flex-direction: column; }
            .summon-form { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="mystic-overlay"></div>
    <div id="particles-js"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="logo-text">KAYDEN</h2>
            <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"><i class="fas fa-magic"></i> The Illusion</a>
            <a href="shows.html"><i class="fas fa-fire"></i> Spectacles</a>
            <a href="about.html"><i class="fas fa-user-secret"></i> The Enigma</a>
            <a href="booking.html" class="active"><i class="fas fa-ticket-alt"></i> Summon Him</a>
        </nav>
    </div>

    <main class="main-content">
        <header class="top-nav">
            <button class="menu-toggle" id="openSidebar"><i class="fas fa-bars"></i></button>
            <h1 class="logo-text">KAYDEN</h1>
        </header>

        <section class="booking-page-container">
            <h1 class="section-title">Initiate the <span class="highlight-green">Summoning</span></h1>
            <p style="text-align: center; margin-bottom: 40px; color: rgba(255,255,255,0.7);">Fill out the details below. Our magic will format your request and instantly connect you to Kayden's secure booking channels.</p>
            
            <form class="summon-form scroll-anim" id="bookingForm">
                <div class="form-group">
                    <label for="summonerName">Your Name / Organization</label>
                    <input type="text" id="summonerName" class="form-control" required placeholder="Who calls upon Kayden?">
                </div>
                
                <div class="form-group">
                    <label for="eventType">Nature of the Event</label>
                    <select id="eventType" class="form-control" required>
                        <option value="Corporate Gala">Corporate Gala</option>
                        <option value="Private Illusion Show">Private Illusion Show</option>
                        <option value="Fire Spectacle (Outdoor)">Fire Spectacle (Outdoor)</option>
                        <option value="Festival / Grand Stage">Festival / Grand Stage</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="eventDate">Prophesied Date</label>
                    <input type="date" id="eventDate" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="message">Details of the Summoning</label>
                    <textarea id="message" class="form-control" placeholder="Location, audience size, and any specific illusions desired..."></textarea>
                </div>

                <div class="submit-btn-group">
                    <button type="button" onclick="launchWhatsApp()" class="btn api-btn whatsapp">
                        <i class="fab fa-whatsapp"></i> Send via WhatsApp
                    </button>
                    <button type="button" onclick="launchInstagram()" class="btn api-btn instagram">
                        <i class="fab fa-instagram"></i> DM via Instagram
                    </button>
                </div>
            </form>
        </section>

        <footer>
            <div class="footer-content">
                <h2 class="logo-text">KAYDEN</h2>
                <p>&copy; 2026 Mysterious Kayden. The Magic is Real.</p>
            </div>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <script src="script.js"></script>
    <script>
        // Perfectionist dynamic API Integration
        function getFormData() {
            const name = document.getElementById('summonerName').value || "A curious spectator";
            const type = document.getElementById('eventType').value;
            const date = document.getElementById('eventDate').value || "TBD";
            const msg = document.getElementById('message').value || "I seek the magic.";
            
            return `The shadows call... %0A%0A*Summoner:* ${name}%0A*Event:* ${type}%0A*Date:* ${date}%0A*Details:* ${msg}%0A%0ALet the magic begin.`;
        }

        function launchWhatsApp() {
            // Replace '1234567890' with Kayden's actual WhatsApp number (include country code, no +)
            const phone = "1234567890"; 
            const text = getFormData();
            window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
        }

        function launchInstagram() {
            // Instagram doesn't support pre-filled text natively via standard web intents as cleanly as WhatsApp, 
            // but we can route them directly to the DM screen.
            const igHandle = "mysteriouskayden";
            // Copies text to clipboard to paste in IG just in case
            navigator.clipboard.writeText(decodeURIComponent(getFormData())).then(() => {
                alert("Your booking details have been copied to your clipboard! Paste them into the Instagram chat.");
                window.open(`https://ig.me/m/${igHandle}`, '_blank');
            });
        }
    </script>
</body>
      </html>
